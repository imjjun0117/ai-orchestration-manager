services:
  postgres:
    image: postgres:16
    container_name: ai-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_manager
      POSTGRES_USER: ai_manager
      POSTGRES_PASSWORD: ai_manager_pw
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./src/db/migrations/015_delivery_governance.up.sql:/docker-entrypoint-initdb.d/zz015_delivery_governance.sql
      - ./src/db/migrations/015_delivery_governance_security.up.sql:/docker-entrypoint-initdb.d/zz015b_delivery_governance_security.sql
      - ./src/db/migrations/015_delivery_governance_rework.up.sql:/docker-entrypoint-initdb.d/zz015c_delivery_governance_rework.sql
      - ./src/db/migrations/015_delivery_governance_operations.up.sql:/docker-entrypoint-initdb.d/zz015d_delivery_governance_operations.sql
